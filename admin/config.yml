backend:
  name: git-gateway
  branch: main

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

locale: "pt"

collections:
  - name: "catalogo"
    label: "Catálogo"
    files:
      - name: "produtos"
        label: "Categorias e produtos"
        file: "content/products.json"
        fields:
          - label: "Categorias (abas de filtro)"
            name: "categorias"
            widget: "list"
            summary: "{{nome}}"
            fields:
              - { label: "ID (não altere se já existir)", name: "id", widget: "string" }
              - { label: "Nome da categoria", name: "nome", widget: "string" }
              - { label: "Ícone (arquivo em assets/img/)", name: "icone", widget: "string" }

          - label: "Produtos"
            name: "produtos"
            widget: "list"
            summary: "{{nome}} ({{categoria}})"
            fields:
              - { label: "ID (não altere se já existir)", name: "id", widget: "string" }
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                options:
                  - { label: "Computadores e Notebooks", value: "computadores" }
                  - { label: "Periféricos", value: "perifericos" }
                  - { label: "Componentes e Peças", value: "componentes" }
                  - { label: "Acessórios", value: "acessorios" }
                  - { label: "Eletrônicos", value: "eletronicos" }
              - { label: "Nome do produto", name: "nome", widget: "string" }
              - { label: "Descrição curta", name: "descricao", widget: "text" }
              - label: "Foto do produto"
                name: "imagem"
                widget: "image"
                media_library: { config: { multiple: false } }
                hint: "Envie uma foto real do produto. Até adicionar, o cartão usa uma ilustração da categoria."

  - name: "depoimentos"
    label: "Depoimentos"
    files:
      - name: "depoimentos"
        label: "Depoimentos de clientes"
        file: "content/testimonials.json"
        fields:
          - label: "Depoimentos"
            name: "depoimentos"
            widget: "list"
            summary: "{{autor}}"
            fields:
              - { label: "Texto do depoimento", name: "texto", widget: "text" }
              - { label: "Nome do cliente", name: "autor", widget: "string" }
