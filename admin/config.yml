backend:
  name: git-gateway
  branch: main

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

locale: "pt"

collections:
  - name: "produtos"
    label: "Produtos (Categorias)"
    files:
      - name: "categorias"
        label: "Categorias de produtos"
        file: "content/products.json"
        fields:
          - label: "Categorias"
            name: "categorias"
            widget: "list"
            summary: "{{nome}}"
            fields:
              - { label: "ID (não altere se já existir)", name: "id", widget: "string" }
              - { label: "Nome da categoria", name: "nome", widget: "string" }
              - { label: "Descrição", name: "descricao", widget: "text" }
              - { label: "Ícone (arquivo em assets/img/)", name: "icone", widget: "string" }
              - label: "Itens em destaque"
                name: "itens"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

  - name: "depoimentos"
    label: "Depoimentos"
    files:
      - name: "depoimentos"
        label: "Depoimentos de clientes"
        file: "content/testimonials.json"
        fields:
          - label: "Depoimentos"
            name: "depoimentos"
            widget: "list"
            summary: "{{autor}}"
            fields:
              - { label: "Texto do depoimento", name: "texto", widget: "text" }
              - { label: "Nome do cliente", name: "autor", widget: "string" }
