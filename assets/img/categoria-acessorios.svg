<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-hidden="true">
  <rect width="400" height="300" fill="#E8F1FB"/>
  <ellipse cx="200" cy="248" rx="150" ry="14" fill="#D3E3F5"/>

  <!-- Cabo USB enrolado -->
  <path d="M70 200c0-60 50-90 100-90s100 30 100 90" fill="none" stroke="#145DA0" stroke-width="10" stroke-linecap="round"/>
  <rect x="56" y="190" width="28" height="20" rx="4" fill="#0F2540"/>
  <rect x="316" y="190" width="28" height="20" rx="4" fill="#0F2540"/>

  <!-- Pendrive -->
  <g transform="translate(160,90)">
    <rect x="0" y="10" width="60" height="30" rx="6" fill="#FF7A1A"/>
    <rect x="-18" y="18" width="20" height="14" rx="3" fill="#0F2540"/>
  </g>

  <!-- Carregador -->
  <g transform="translate(250,60)">
    <rect x="0" y="0" width="34" height="46" rx="6" fill="#0F2540"/>
    <rect x="10" y="46" width="14" height="18" fill="#0F2540"/>
    <circle cx="10" cy="14" r="3" fill="#8FC1FF"/>
    <circle cx="24" cy="14" r="3" fill="#8FC1FF"/>
  </g>

  <!-- Cartão de memória -->
  <g transform="translate(90,60)">
    <path d="M0 6 L26 6 L34 14 L34 46 L0 46 Z" fill="#145DA0"/>
    <rect x="6" y="14" width="8" height="14" fill="#8FC1FF"/>
    <rect x="18" y="14" width="8" height="14" fill="#8FC1FF"/>
  </g>
</svg>
